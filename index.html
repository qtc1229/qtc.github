<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>机箱库存管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
:root{--page-bg:#f3f4f6;--panel-bg:#fff;--panel-border:#e5e7eb;--soft-bg:#f9fafb;--text-main:#1f2937;--text-sub:#6b7280;--text-muted:#9ca3af;--nav-bg:#fff;--accent:#2563eb;--accent-2:#16a34a;--danger:#dc2626}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;overscroll-behavior:none;background:var(--page-bg);color:var(--text-main);transition:background .35s ease,color .35s ease}
body.theme-dark{--page-bg:#05070d;--panel-bg:#111827;--panel-border:#243044;--soft-bg:#0b1120;--text-main:#e5e7eb;--text-sub:#cbd5e1;--text-muted:#94a3b8;--nav-bg:#0b1120;--accent:#60a5fa;--accent-2:#34d399;--danger:#fb7185;color-scheme:dark}
body.theme-glass{--page-bg:#dce7f7;--panel-bg:rgba(255,255,255,.54);--panel-border:rgba(255,255,255,.58);--soft-bg:rgba(255,255,255,.32);--text-main:#172033;--text-sub:#41516b;--text-muted:#6f7f96;--nav-bg:rgba(255,255,255,.62);--accent:#1473e6;--accent-2:#0f9f6e;--danger:#d92d4b;background:radial-gradient(circle at 14% 8%,rgba(255,255,255,.95),transparent 26%),radial-gradient(circle at 82% 18%,rgba(122,190,255,.72),transparent 34%),linear-gradient(135deg,#eef6ff 0%,#dce7f7 38%,#f7e8ff 100%);background-attachment:fixed}
#reader video{width:100%!important;border-radius:8px}
#reader img{display:none}
.fade-in{animation:fi .15s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tab-content{display:none}
.tab-content.active{display:block}
.tab-content.switch-in{animation:appSwitchIn .32s cubic-bezier(.2,.8,.2,1)}
.tab-content.switch-out{animation:appSwitchOut .22s cubic-bezier(.4,0,.2,1)}
@keyframes appSwitchIn{from{opacity:0;transform:translateY(18px) scale(.965);filter:blur(8px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
@keyframes appSwitchOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-10px) scale(.985)}}
mark{background:#fef08a;border-radius:2px;padding:0 1px}
header,nav,.bg-white{background:var(--panel-bg)!important;border-color:var(--panel-border)!important;color:var(--text-main)!important;transition:background .35s ease,border-color .35s ease,color .35s ease,box-shadow .35s ease}
nav{background:var(--nav-bg)!important}
.bg-gray-50,.bg-gray-100{background:var(--soft-bg)!important}
.text-gray-800,.text-gray-700{color:var(--text-main)!important}
.text-gray-600,.text-gray-500{color:var(--text-sub)!important}
.text-gray-400,.text-gray-300{color:var(--text-muted)!important}
.border-gray-50,.border-gray-100,.border-gray-200{border-color:var(--panel-border)!important}
input,select,textarea{background:var(--panel-bg)!important;color:var(--text-main)!important;border-color:var(--panel-border)!important}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
body.theme-dark .shadow-sm{box-shadow:0 12px 28px rgba(0,0,0,.32)!important}
body.theme-dark .bg-blue-50{background:rgba(37,99,235,.18)!important}
body.theme-dark .bg-green-50{background:rgba(16,185,129,.16)!important}
body.theme-dark .bg-red-50{background:rgba(244,63,94,.16)!important}
body.theme-glass header,body.theme-glass nav,body.theme-glass .bg-white,body.theme-glass #modal-mask>div{backdrop-filter:blur(24px) saturate(1.55);-webkit-backdrop-filter:blur(24px) saturate(1.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.72),0 18px 42px rgba(47,75,118,.16)!important}
body.theme-glass .shadow-sm{box-shadow:inset 0 1px 0 rgba(255,255,255,.72),0 18px 42px rgba(47,75,118,.13)!important}
body.theme-glass input,body.theme-glass select,body.theme-glass textarea{background:rgba(255,255,255,.5)!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.theme-btn{border:1px solid var(--panel-border);background:var(--soft-bg);color:var(--text-sub);transition:transform .18s ease,background .25s ease,color .25s ease,border-color .25s ease,box-shadow .25s ease}
.theme-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 10px 24px rgba(37,99,235,.24);transform:translateY(-1px)}
body.theme-glass .theme-btn.active{background:rgba(20,115,230,.78);border-color:rgba(255,255,255,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
nav button{transition:color .22s ease,border-color .22s ease,transform .22s cubic-bezier(.2,.8,.2,1)}
nav button.text-blue-600{transform:translateY(-2px) scale(1.04)}
@media (prefers-reduced-motion:reduce){.tab-content.switch-in,.tab-content.switch-out,.fade-in{animation:none!important}nav button,.theme-btn,body,header,nav,.bg-white{transition:none!important}}
</style>
</head>
<body>
<div class="max-w-lg mx-auto min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="px-4 py-3 flex items-center justify-between">
    <h1 class="text-base font-semibold text-gray-800">机箱库存管理</h1>
    <span id="hd-count" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">0 台</span>
  </div>
</header>

<!-- Storage Warning -->
<div id="storage-warn" class="hidden bg-red-600 text-white text-xs px-4 py-2 text-center">
  ⚠ 本地存储不可用（请勿使用无痕/隐私模式），数据将在刷新后丢失
</div>

<!-- Content -->
<main class="flex-1 overflow-auto pb-20">

  <!-- TAB: 库存 -->
  <div id="tab-inventory" class="tab-content active">
    <div class="p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-medium text-gray-600">排 / 层 / 序列号</span>
        <div class="flex gap-2">
          <button onclick="showQuickAddItemModal()" class="bg-green-600 text-white text-sm px-3 py-1.5 rounded-lg font-medium">+ 新增机箱</button>
          <button onclick="showAddRowModal()" class="bg-blue-600 text-white text-sm px-3 py-1.5 rounded-lg font-medium">+ 新增排</button>
        </div>
      </div>
      <div id="rows-container"></div>
      <div id="inv-empty" class="hidden text-center py-16 text-gray-400">
        <div class="text-4xl mb-2">[ ]</div>
        <p class="text-sm">暂无数据，点击「新增排」开始</p>
      </div>
    </div>
  </div>

  <!-- TAB: 扫码 -->
  <div id="tab-scanner" class="tab-content">
    <div class="p-4 space-y-4">
      <div class="bg-white rounded-xl overflow-hidden shadow-sm">
        <div id="reader" class="min-h-40 bg-gray-100"></div>
      </div>
      <div id="scan-result-bar" class="hidden bg-green-50 border border-green-200 rounded-xl px-4 py-3">
        <p class="text-xs text-green-600 font-medium">扫码成功</p>
        <p id="scan-result-val" class="font-mono text-green-800 text-sm mt-0.5"></p>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 space-y-3">
        <p class="text-sm font-medium text-gray-700">录入信息</p>
        <div>
          <label class="text-xs text-gray-400 block mb-1">序列号</label>
          <div class="flex gap-2">
            <input id="sc-serial" type="text" placeholder="扫码自动填入或手动输入"
              class="flex-1 border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
            <button onclick="startScan()" class="bg-blue-600 text-white px-3 rounded-lg text-sm">扫码</button>
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">物品名称</label>
          <input id="sc-name" type="text" value="机箱" placeholder="扫码自动填入或手动输入"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择排 <span class="text-gray-300">（从前往后数）</span></label>
          <select id="sc-row" onchange="refreshScLayer()" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择层</label>
          <select id="sc-layer" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请先选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">第几台 <span class="text-gray-300">（从右往左数）</span></label>
          <input id="sc-pos" type="number" min="1" placeholder="输入台号，如 3"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">备注（可选）</label>
          <input id="sc-notes" type="text" placeholder="可留空"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
        <button onclick="submitScanEntry()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">保存录入</button>
      </div>
    </div>
  </div>

  <!-- TAB: 搜索 -->
  <div id="tab-search" class="tab-content">
    <div class="p-4">
      <div class="relative mb-4">
        <input id="srch-input" type="text" placeholder="输入序列号（支持模糊匹配）"
          oninput="doSearch()"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 pl-9 text-sm bg-white shadow-sm focus:outline-none focus:border-blue-400">
        <span class="absolute left-3 top-3.5 text-gray-400 text-sm">S</span>
      </div>
      <div id="srch-placeholder" class="text-center py-16 text-gray-400 text-sm">输入序列号进行搜索</div>
      <div id="srch-empty" class="hidden text-center py-16 text-gray-400 text-sm">未找到相关记录</div>
      <div id="srch-results"></div>
    </div>
  </div>

  <!-- TAB: 待办 -->
  <div id="tab-todo" class="tab-content">
    <div class="p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-medium text-gray-600">待办机箱</span>
        <span id="todo-count" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">0 台</span>
      </div>
      <div id="todo-empty" class="hidden text-center py-16 text-gray-400">
        <div class="text-4xl mb-2">✓</div>
        <p class="text-sm">暂无待办，从搜索结果右侧收藏添加</p>
      </div>
      <div id="todo-list"></div>
    </div>
  </div>

  <!-- TAB: 数据 -->
  <div id="tab-data" class="tab-content">
    <div class="p-4 space-y-4">
      <div class="bg-white rounded-xl shadow-sm p-4">
        <p class="text-sm font-medium text-gray-700 mb-3">数据统计</p>
        <div class="grid grid-cols-3 gap-2 text-center">
          <div><div id="st-rows" class="text-2xl font-bold text-blue-600">0</div><div class="text-xs text-gray-400 mt-1">排</div></div>
          <div><div id="st-layers" class="text-2xl font-bold text-green-600">0</div><div class="text-xs text-gray-400 mt-1">层</div></div>
          <div><div id="st-items" class="text-2xl font-bold text-purple-600">0</div><div class="text-xs text-gray-400 mt-1">序列号</div></div>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4">
        <p class="text-sm font-medium text-gray-700 mb-3">皮肤切换</p>
        <div class="grid grid-cols-3 gap-2">
          <button id="theme-default" onclick="setTheme('default')" class="theme-btn py-2.5 rounded-lg text-xs font-medium">默认</button>
          <button id="theme-dark" onclick="setTheme('dark')" class="theme-btn py-2.5 rounded-lg text-xs font-medium">黑夜</button>
          <button id="theme-glass" onclick="setTheme('glass')" class="theme-btn py-2.5 rounded-lg text-xs font-medium">液态玻璃</button>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4">
        <div class="flex items-center justify-between">
          <p class="text-sm font-medium text-gray-700">云端同步</p>
          <span id="cloud-status" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">未配置</span>
        </div>
        <p class="text-xs text-gray-400 mt-2">配置 Supabase 免费项目后，可在手机和电脑之间同步同一份库存。</p>
        <div class="grid grid-cols-3 gap-2 mt-3">
          <button onclick="showCloudConfigModal()" class="py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-xs font-medium">配置</button>
          <button onclick="pullCloudNow()" class="py-2 bg-gray-50 text-gray-700 border border-gray-200 rounded-lg text-xs font-medium">读取</button>
          <button onclick="pushCloudNow()" class="py-2 bg-green-50 text-green-700 border border-green-200 rounded-lg text-xs font-medium">上传</button>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 space-y-3">
        <p class="text-sm font-medium text-gray-700">批量导入序列号</p>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择排</label>
          <select id="bt-row" onchange="refreshBtLayer()" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择层</label>
          <select id="bt-layer" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请先选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">序列号（每行一个）</label>
          <textarea id="bt-serials" rows="5" placeholder="123456&#10;123457&#10;123458"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-mono resize-none focus:outline-none focus:border-blue-400"></textarea>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">从第几个开始 <span class="text-gray-300">（可选）</span></label>
          <input id="bt-start-pos" type="number" min="1" placeholder="如 1，导入后自动递增"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
        <button onclick="doBatchImport()" class="w-full bg-green-600 text-white py-3 rounded-xl text-sm font-medium">批量导入</button>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 space-y-2">
        <p class="text-sm font-medium text-gray-700 mb-1">数据备份</p>
        <button onclick="doExport()" class="w-full bg-blue-50 text-blue-700 border border-blue-200 py-3 rounded-xl text-sm font-medium">导出 JSON 备份</button>
        <button onclick="document.getElementById('imp-file').click()" class="w-full bg-gray-50 text-gray-700 border border-gray-200 py-3 rounded-xl text-sm font-medium">导入 JSON 备份</button>
        <input id="imp-file" type="file" accept=".json" onchange="doImport(event)" class="hidden">
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 border border-red-100">
        <p class="text-sm font-medium text-red-500 mb-2">危险操作</p>
        <button onclick="confirmReset()" class="w-full bg-red-50 text-red-600 border border-red-200 py-3 rounded-xl text-sm font-medium">重置全部数据</button>
      </div>
    </div>
  </div>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
  <div class="max-w-lg mx-auto grid grid-cols-5">
    <button onclick="gotoTab('inventory')" id="nav-inventory" class="flex flex-col items-center py-2 text-blue-600 border-t-2 border-blue-600">
      <span class="text-lg font-bold">#</span><span class="text-xs mt-0.5 font-medium">库存</span>
    </button>
    <button onclick="gotoTab('scanner')" id="nav-scanner" class="flex flex-col items-center py-2 text-gray-400 border-t-2 border-transparent">
      <span class="text-lg">O</span><span class="text-xs mt-0.5">扫码</span>
    </button>
    <button onclick="gotoTab('search')" id="nav-search" class="flex flex-col items-center py-2 text-gray-400 border-t-2 border-transparent">
      <span class="text-lg">S</span><span class="text-xs mt-0.5">搜索</span>
    </button>
    <button onclick="gotoTab('todo')" id="nav-todo" class="flex flex-col items-center py-2 text-gray-400 border-t-2 border-transparent">
      <span class="text-lg">★</span><span class="text-xs mt-0.5">待办</span>
    </button>
    <button onclick="gotoTab('data')" id="nav-data" class="flex flex-col items-center py-2 text-gray-400 border-t-2 border-transparent">
      <span class="text-lg">D</span><span class="text-xs mt-0.5">数据</span>
    </button>
  </div>
</nav>

</div>

<!-- Modal -->
<div id="modal-mask" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center flex">
  <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg p-5 pb-8 sm:pb-5 max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modal-title" class="text-base font-semibold text-gray-800"></h3>
      <button onclick="closeModal()" class="text-gray-400 text-lg leading-none px-1">x</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-14 inset-x-0 flex justify-center z-50 pointer-events-none hidden">
  <div id="toast-inner" class="bg-gray-800 text-white text-sm px-4 py-2 rounded-full shadow-lg max-w-xs text-center"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────
const KEY = 'chassis_v1';
const CLOUD_CONFIG_KEY = 'chassis_cloud_config_v1';
const THEME_KEY = 'chassis_theme_v1';
let db = {rows:[],todos:[]};
const CLOUD = {
  supabaseUrl: 'https://dgscqhlrzuexqvyutpap.supabase.co',
  supabaseAnonKey: 'sb_publishable_4O7dw6cfDA_IRc1Kpkkn6A_BUyNoRA0',
  table: 'inventory_state',
  docId: 'default'
};
let cloudClient = null;
let cloudReady = false;
let cloudTimer = null;
let currentTheme = 'default';

function storageOK(){try{localStorage.setItem('__chk','1');localStorage.removeItem('__chk');return true;}catch(e){return false;}}
function loadTheme(){
  if(!storageOK())return;
  try{currentTheme=localStorage.getItem(THEME_KEY)||'default';}catch(e){currentTheme='default';}
}
function setTheme(theme){
  currentTheme=['default','dark','glass'].includes(theme)?theme:'default';
  document.body.classList.remove('theme-dark','theme-glass');
  if(currentTheme==='dark')document.body.classList.add('theme-dark');
  if(currentTheme==='glass')document.body.classList.add('theme-glass');
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('theme-'+currentTheme);
  if(btn)btn.classList.add('active');
  if(storageOK())localStorage.setItem(THEME_KEY,currentTheme);
}
function load(){
  if(!storageOK()){showStorageWarn();return;}
  try{const s=localStorage.getItem(KEY);if(s)db=JSON.parse(s);}catch(e){db={rows:[]};}
  normalizeDb();
}
function loadCloudConfig(){
  if(!storageOK())return;
  try{
    const s=localStorage.getItem(CLOUD_CONFIG_KEY);
    if(s)Object.assign(CLOUD,JSON.parse(s));
  }catch(e){}
}
function saveLocalOnly(){
  if(!storageOK()){showStorageWarn();return;}
  try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){showStorageWarn();}
}
function save(){
  normalizeDb();
  saveLocalOnly();
  queueCloudSave();
  refreshStats();
  if(typeof activeTab!=='undefined'&&activeTab==='todo')renderTodo();
}
function showStorageWarn(){
  const el=document.getElementById('storage-warn');
  if(el)el.classList.remove('hidden');
}
function cloudConfigured(){
  return CLOUD.supabaseUrl&&CLOUD.supabaseAnonKey&&window.supabase;
}
function createCloudClient(){
  if(!cloudConfigured())return null;
  if(!cloudClient)cloudClient=window.supabase.createClient(CLOUD.supabaseUrl,CLOUD.supabaseAnonKey);
  return cloudClient;
}
function setCloudStatus(text,type='idle'){
  const el=document.getElementById('cloud-status');if(!el)return;
  el.textContent=text;
  el.className='text-xs px-2 py-1 rounded-full '+(type==='ok'?'text-green-700 bg-green-50':type==='err'?'text-red-600 bg-red-50':type==='sync'?'text-blue-700 bg-blue-50':'text-gray-400 bg-gray-100');
}
async function initCloud(){
  if(!cloudConfigured()){setCloudStatus('未配置');return;}
  try{
    setCloudStatus('同步中','sync');
    createCloudClient();
    const {data,error}=await cloudClient.from(CLOUD.table).select('data').eq('id',CLOUD.docId).maybeSingle();
    if(error)throw error;
    if(data&&data.data&&Array.isArray(data.data.rows)){
      if(db.rows.length&&data.data.rows.length===0){
        cloudReady=true;
        await saveCloudNow();
        setCloudStatus('已同步','ok');
        return;
      }
      db=data.data;
      normalizeDb();
      saveLocalOnly();
      renderInv();
      renderTodo();
      refreshStats();
    }else{
      await saveCloudNow();
    }
    cloudReady=true;
    setCloudStatus('已同步','ok');
  }catch(e){
    console.warn(e);
    setCloudStatus('同步失败','err');
    toast('云端同步失败，已使用本地数据','err');
  }
}

async function pullCloudNow(){
  if(!cloudConfigured()){toast('请先配置云端','err');showCloudConfigModal();return;}

    const {data,error}=await cloudClient.from(CLOUD.table).select('data').eq('id',CLOUD.docId).maybeSingle();
    if(error)throw error;
    if(!data||!data.data){toast('云端还没有数据，可先上传本地数据','err');setCloudStatus('无云端数据','err');return;}
    db=data.data;

    renderTodo();
    refreshStats();

  }catch(e){console.warn(e);setCloudStatus('读取失败','err');toast('云端读取失败','err');}
}
async function pushCloudNow(){
  if(!cloudConfigured()){toast('请先配置云端','err');showCloudConfigModal();return;}
  try{
    setCloudStatus('上传中','sync');

    await saveCloudNow();

    toast('已上传到云端');

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function now(){return new Date().toISOString();}
function fmtDate(s){if(!s)return'-';const d=new Date(s);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;}
function p2(n){return String(n).padStart(2,'0');}
function chNum(n){return['一','二','三','四','五','六','七','八','九','十'][n]||String(n+1);}
function normalizeDb(){
  if(!db||typeof db!=='object')db={rows:[],todos:[]};
  if(!Array.isArray(db.rows))db.rows=[];
  if(!Array.isArray(db.todos))db.todos=[];
  if(!Array.isArray(db.movedItems))db.movedItems=[];
  db.todos=[...new Set(db.todos.map(s=>String(s||'').trim()).filter(Boolean))];
}

function addRow(name){const r={id:uid(),name,layers:[]};db.rows.push(r);save();return r;}
function delRow(id){db.rows=db.rows.filter(r=>r.id!==id);save();}
function updRow(id,name){const r=db.rows.find(r=>r.id===id);if(r){r.name=name;save();}}

function addLayer(rowId,name){const r=db.rows.find(r=>r.id===rowId);if(!r)return;const l={id:uid(),name,items:[]};r.layers.push(l);save();return l;}
function delLayer(rowId,lid){const r=db.rows.find(r=>r.id===rowId);if(r){r.layers=r.layers.filter(l=>l.id!==lid);save();}}
function updLayer(rowId,lid,name){const r=db.rows.find(r=>r.id===rowId);if(!r)return;const l=r.layers.find(l=>l.id===lid);if(l){l.name=name;save();}}

function addItem(rowId,layerId,sn,notes='',itemName='机箱',position=''){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return null;
  const l=r.layers.find(l=>l.id===layerId);if(!l)return null;
  if(allItems().find(e=>e.item.serialNumber===sn))return'dup';
  const item={id:uid(),serialNumber:sn,name:itemName,position,notes,createdAt:now(),updatedAt:now()};
  l.items.push(item);save();return item;
}
function delItem(rowId,lid,iid){const r=db.rows.find(r=>r.id===rowId);if(!r)return;const l=r.layers.find(l=>l.id===lid);if(l){const item=l.items.find(i=>i.id===iid);l.items=l.items.filter(i=>i.id!==iid);if(item)db.todos=db.todos.filter(sn=>sn!==item.serialNumber);save();}}
function posNumber(pos){
  const n=parseInt(String(pos||'').trim(),10);
  return Number.isFinite(n)&&n>0?n:null;
}
function compactLayerAfterMoveOut(layer,removedPosition){
  const removed=posNumber(removedPosition);
  if(!layer||!removed)return 0;
  let changed=0;
  layer.items.forEach(item=>{
    const p=posNumber(item.position);
    if(p&&p>removed){
      item.position=String(p-1);
      item.updatedAt=now();
      changed++;
    }
  });
  return changed;
}
function moveOutItem(rowId,lid,iid){
  normalizeDb();
  const r=db.rows.find(r=>r.id===rowId);if(!r)return null;
  const l=r.layers.find(l=>l.id===lid);if(!l)return null;
  const idx=l.items.findIndex(i=>i.id===iid);if(idx===-1)return null;
  const item=l.items.splice(idx,1)[0];
  const movedAt=now();
  const shifted=compactLayerAfterMoveOut(l,item.position);
  db.todos=db.todos.filter(sn=>sn!==item.serialNumber);
  db.movedItems.push({
    ...item,
    movedAt,
    status:'moved',
    previousRowId:rowId,
    previousLayerId:lid,
    previousRowName:r.name,
    previousLayerName:l.name,
    previousPosition:item.position,
    updatedAt:movedAt
  });
  save();
  return{item,shifted};
}
function updItem(rowId,lid,iid,data){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  const l=r.layers.find(l=>l.id===lid);if(!l)return;
  const i=l.items.find(i=>i.id===iid);if(i){Object.assign(i,data,{updatedAt:now()});save();}
}
function moveItem(sn,srcRowId,srcLid,dstRowId,dstLid,notes){
  const sr=db.rows.find(r=>r.id===srcRowId);if(!sr)return;
  const sl=sr.layers.find(l=>l.id===srcLid);if(!sl)return;
  const idx=sl.items.findIndex(i=>i.serialNumber===sn);if(idx===-1)return;
  const item=sl.items.splice(idx,1)[0];
  item.notes=notes;item.updatedAt=now();
  const dr=db.rows.find(r=>r.id===dstRowId);if(!dr)return;
  const dl=dr.layers.find(l=>l.id===dstLid);if(!dl)return;
  dl.items.push(item);save();
}

function allItems(){
  const out=[];
  db.rows.forEach(row=>row.layers.forEach(layer=>layer.items.forEach(item=>out.push({row,layer,item}))));
  return out;
}
function allMovedItems(){
  normalizeDb();
  return db.movedItems.map(item=>({item,moved:true}));
}
function findItemBySerial(sn){return allItems().find(e=>e.item.serialNumber===sn);}
function isTodo(sn){normalizeDb();return db.todos.includes(sn);}
function addTodo(sn){
  normalizeDb();
  if(!sn)return;
  if(!db.todos.includes(sn)){db.todos.push(sn);save();toast('已加入待办');}
  if(activeTab==='search')doSearch();

function removeTodo(sn){
  normalizeDb();
  db.todos=db.todos.filter(s=>s!==sn);
  save();
  if(activeTab==='search')doSearch();
  renderTodo();
  toast('已移出待办');
}
function stats(){let la=0,it=0;db.rows.forEach(r=>{la+=r.layers.length;r.layers.forEach(l=>it+=l.items.length);});return{rows:db.rows.length,layers:la,items:it};}

  const sn=document.getElementById('m-esn').value.trim();
  const nm=document.getElementById('m-enm').value.trim()||'机箱';
  const newRowId=document.getElementById('m-er').value;
  const newLid=document.getElementById('m-el').value;
  const pos=document.getElementById('m-epos').value.trim();
  const nt=document.getElementById('m-ent').value.trim();
  if(!sn){toast('序列号不能为空','err');return;}
  if(!newLid){toast('请选择层','err');return;}
  const oldSn=item.serialNumber;
  const dup=allItems().find(e=>e.item.serialNumber===sn&&e.item.id!==iid);
  if(dup){toast('该序列号已存在！','err');return;}
  if(newRowId===origRowId&&newLid===origLid){
    updItem(origRowId,origLid,iid,{serialNumber:sn,name:nm,position:pos,notes:nt});
  } else {
    updItem(origRowId,origLid,iid,{serialNumber:sn,name:nm,position:pos,notes:nt});

    const sl=sr&&sr.layers.find(l=>l.id===origLid);

      const idx=sl.items.findIndex(i=>i.id===iid);
      if(idx!==-1){
        const item=sl.items.splice(idx,1)[0];
        const dr=db.rows.find(r=>r.id===newRowId);

        if(dl)dl.items.push(item);
        save();

  }
  if(oldSn!==sn&&db.todos.includes(oldSn)){
    db.todos=db.todos.map(s=>s===oldSn?sn:s);

  closeModal();renderInv();toast('已更新');

// ── SCANNER ───────────────────────────────────────────────
let qr=null;

// 解析二维码内容，支持多行 "字段:值" 格式
// 示例：资产编号:L001-100808903\n资产名称:兼容电脑主机
function parseQR(text){
  const lines=text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  let sn=text.trim();
  let name='机箱';
  if(lines.length>1){
    for(const line of lines){
      // 同时支持半角冒号和全角冒号
      const snM=line.match(/资产编号\s*[：:]\s*(.+)/);
      const nmM=line.match(/资产名称\s*[：:]\s*(.+)/);
      if(snM)sn=snM[1].trim();
      if(nmM)name=nmM[1].trim();
    }
  }
  return{sn,name};
}

  if(qr.isScanning)return;
  qr.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:240}},
    (text)=>{
      const parsed=parseQR(text);
      document.getElementById('sc-serial').value=parsed.sn;
      document.getElementById('sc-name').value=parsed.name;
      document.getElementById('scan-result-val').textContent=`编号: ${parsed.sn}  名称: ${parsed.name}`;
      document.getElementById('scan-result-bar').classList.remove('hidden');
      stopScan();toast('扫码成功');
    },()=>{}
  ).catch(()=>toast('无法启动摄像头，请检查权限','err'));
}

    <div class="bg-white rounded-xl shadow-sm p-4 mb-3 fade-in border border-orange-100">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0">
          <div class="font-mono font-medium text-gray-800">${hlMatch(e.item.serialNumber,q)}</div>
          <div class="text-sm text-gray-500 mt-1">${esc(e.item.name)}</div>
          <div class="text-sm text-orange-600 mt-0.5">已搬离 · 原位置：${esc(e.item.previousRowName||'-')} &gt; ${esc(e.item.previousLayerName||'-')}${e.item.previousPosition?` &gt; 第${esc(e.item.previousPosition)}个`:''}</div>
          ${e.item.notes?`<div class="text-xs text-gray-400 mt-0.5">备注: ${esc(e.item.notes)}</div>`:''}
          <div class="text-xs text-gray-300 mt-1">搬离: ${fmtDate(e.item.movedAt)}</div>
        </div>
        <span class="ml-2 px-2 py-1 text-xs text-orange-600 bg-orange-50 rounded shrink-0">已搬离</span>
      </div>
    </div>`).join('');
}
function hlMatch(text,q){
  const s=esc(text);const qe=esc(q);
  return s.replace(new RegExp(qe.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
}

// ── TODO ──────────────────────────────────────────────────
function renderTodo(){
  normalizeDb();
  const list=document.getElementById('todo-list');
  const empty=document.getElementById('todo-empty');
  const count=document.getElementById('todo-count');
  if(count)count.textContent=db.todos.length+' 台';
  if(!list||!empty)return;
  if(!db.todos.length){
    list.innerHTML='';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  list.innerHTML=db.todos.map(sn=>{
    const e=findItemBySerial(sn);
    if(!e){
      return`<div class="bg-white rounded-xl shadow-sm p-4 mb-3 fade-in border border-red-100">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="font-mono text-sm text-gray-800 break-all">${esc(sn)}</div>
            <div class="text-xs text-red-500 mt-1">库存中不存在，可能已被删除</div>
          </div>
          <button onclick="removeTodo('${jsArg(sn)}')" class="px-2 py-1 text-xs text-red-500 hover:bg-red-50 rounded shrink-0">移除</button>
        </div>
      </div>`;
    }
    return`<div class="bg-white rounded-xl shadow-sm p-4 mb-3 fade-in">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="font-mono text-sm text-gray-800 break-all">${esc(e.item.serialNumber)}</div>
          <div class="text-sm text-gray-500 mt-1">${esc(e.item.name)}</div>
          <div class="text-sm text-blue-600 mt-0.5">${locationText(e.row,e.layer,e.item)}</div>
          ${e.item.notes?`<div class="text-xs text-gray-400 mt-0.5">备注: ${esc(e.item.notes)}</div>`:''}
        </div>
        <div class="flex flex-col gap-1 shrink-0">
          <button onclick="moveOutItemConfirm('${e.row.id}','${e.layer.id}','${e.item.id}')" class="px-2 py-1 text-xs text-orange-500 hover:bg-orange-50 rounded">已搬离</button>
          <button onclick="removeTodo('${jsArg(sn)}')" class="px-2 py-1 text-xs text-red-500 hover:bg-red-50 rounded">移除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── DATA TAB ──────────────────────────────────────────────
function refreshStats(){
  const s=stats();
  const g=id=>document.getElementById(id);
  if(g('st-rows'))g('st-rows').textContent=s.rows;
  if(g('st-layers'))g('st-layers').textContent=s.layers;
  if(g('st-items'))g('st-items').textContent=s.items;
  if(g('hd-count'))g('hd-count').textContent=s.items+' 台';
  if(g('todo-count'))g('todo-count').textContent=(db.todos?db.todos.length:0)+' 台';
}
function refreshBtSelects(){
  const rs=document.getElementById('bt-row');if(!rs)return;
  rs.innerHTML='<option value="">-- 请选择排 --</option>'+db.rows.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('');
  document.getElementById('bt-layer').innerHTML='<option value="">-- 请先选择排 --</option>';
}
function refreshBtLayer(){
  const id=document.getElementById('bt-row').value;
  const r=db.rows.find(r=>r.id===id);
  const sel=document.getElementById('bt-layer');
  if(!r){sel.innerHTML='<option value="">-- 请先选择排 --</option>';return;}
  sel.innerHTML=r.layers.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')||'<option value="">该排无层</option>';
}
function doBatchImport(){
  const rowId=document.getElementById('bt-row').value;
  const lid=document.getElementById('bt-layer').value;
  const txt=document.getElementById('bt-serials').value.trim();
  const startPos=document.getElementById('bt-start-pos').value.trim();
  if(!rowId){toast('请选择排','err');return;}
  if(!lid){toast('请选择层','err');return;}
  if(!txt){toast('请输入序列号','err');return;}
  if(startPos&&Number(startPos)<1){toast('起始位置必须大于 0','err');return;}
  const sns=txt.split('\n').map(s=>s.trim()).filter(Boolean);
  let added=0,dup=0;
  sns.forEach((sn,idx)=>{
    const pos=startPos?String(Number(startPos)+idx):'';
    const r=addItem(rowId,lid,sn,'','机箱',pos);
    if(r==='dup')dup++;else if(r)added++;
  });
  document.getElementById('bt-serials').value='';
  document.getElementById('bt-start-pos').value='';
  toast(`导入完成：添加 ${added} 个，跳过重复 ${dup} 个`);
}
function doExport(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`机箱库存_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  a.click();URL.revokeObjectURL(url);toast('导出成功');
}
function doImport(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.rows||!Array.isArray(data.rows))throw new Error();
      window.__imp=data;
      showModal('确认导入',`<div class="space-y-4">
        <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-sm text-yellow-800">
          <p class="font-medium">将覆盖现有全部数据！</p>
          <p class="mt-1">文件含 ${data.rows.length} 排，确认导入？</p>
        </div>
        <div class="flex gap-3">
          <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm text-gray-600">取消</button>
          <button onclick="execImport()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-sm font-medium">确认导入</button>
        </div>
      </div>`);
    }catch{toast('文件格式错误','err');}
  };
  reader.readAsText(f);
  e.target.value='';
}
function execImport(){if(!window.__imp)return;db=window.__imp;save();closeModal();renderInv();toast('导入成功');}
function confirmReset(){
  showModal('重置全部数据',`<div class="space-y-4">
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">
      <p class="font-bold">此操作不可恢复！</p>
      <p class="mt-1">删除全部排、层、序列号数据。建议先导出备份。</p>
    </div>
    <input id="m-confirm" type="text" placeholder="输入「确认重置」继续"
      class="w-full border border-red-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:border-red-400">
    <input id="m-reset-pass" type="password" inputmode="numeric" placeholder="输入重置密码"
      class="w-full border border-red-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:border-red-400">
    <div class="flex gap-3">
      <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm text-gray-600">取消</button>
      <button onclick="execReset()" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-sm font-medium">重置</button>
    </div>
  </div>`);
}
function execReset(){
  if(document.getElementById('m-confirm').value.trim()!=='确认重置'){toast('请输入「确认重置」','err');return;}
  if(document.getElementById('m-reset-pass').value.trim()!=='1229'){toast('重置密码错误','err');return;}
  db={rows:[]};save();closeModal();renderInv();toast('已重置','err');
}

loadTheme();
setTheme(currentTheme);
load();
loadCloudConfig();
renderInv();
renderTodo();
refreshStats();
initCloud();
