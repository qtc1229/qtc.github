<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>机箱库存管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;overscroll-behavior:none;background:#f3f4f6}
#reader video{width:100%!important;border-radius:8px}
#reader img{display:none}
.fade-in{animation:fi .15s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tab-content{display:none}
.tab-content.active{display:block}
mark{background:#fef08a;border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div class="max-w-lg mx-auto min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="px-4 py-3 flex items-center justify-between">
    <h1 class="text-base font-semibold text-gray-800">机箱库存管理</h1>
    <span id="hd-count" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">0 台</span>
  </div>
</header>

<!-- Content -->
<main class="flex-1 overflow-auto pb-20">

  <!-- TAB: 库存 -->
  <div id="tab-inventory" class="tab-content active">
    <div class="p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-medium text-gray-600">排 / 层 / 序列号</span>
        <button onclick="showAddRowModal()" class="bg-blue-600 text-white text-sm px-3 py-1.5 rounded-lg font-medium">+ 新增排</button>
      </div>
      <div id="rows-container"></div>
      <div id="inv-empty" class="hidden text-center py-16 text-gray-400">
        <div class="text-4xl mb-2">[ ]</div>
        <p class="text-sm">暂无数据，点击「新增排」开始</p>
      </div>
    </div>
  </div>

  <!-- TAB: 扫码 -->
  <div id="tab-scanner" class="tab-content">
    <div class="p-4 space-y-4">
      <div class="bg-white rounded-xl overflow-hidden shadow-sm">
        <div id="reader" class="min-h-40 bg-gray-100"></div>
      </div>
      <div id="scan-result-bar" class="hidden bg-green-50 border border-green-200 rounded-xl px-4 py-3">
        <p class="text-xs text-green-600 font-medium">扫码成功</p>
        <p id="scan-result-val" class="font-mono text-green-800 text-sm mt-0.5"></p>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 space-y-3">
        <p class="text-sm font-medium text-gray-700">录入信息</p>
        <div>
          <label class="text-xs text-gray-400 block mb-1">序列号</label>
          <div class="flex gap-2">
            <input id="sc-serial" type="text" placeholder="扫码自动填入或手动输入"
              class="flex-1 border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
            <button onclick="startScan()" class="bg-blue-600 text-white px-3 rounded-lg text-sm">扫码</button>
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择排</label>
          <select id="sc-row" onchange="refreshScLayer()" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择层</label>
          <select id="sc-layer" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请先选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">备注（可选）</label>
          <input id="sc-notes" type="text" placeholder="可留空"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
        </div>
        <button onclick="submitScanEntry()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">保存录入</button>
      </div>
    </div>
  </div>

  <!-- TAB: 搜索 -->
  <div id="tab-search" class="tab-content">
    <div class="p-4">
      <div class="relative mb-4">
        <input id="srch-input" type="text" placeholder="输入序列号（支持模糊匹配）"
          oninput="doSearch()"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 pl-9 text-sm bg-white shadow-sm focus:outline-none focus:border-blue-400">
        <span class="absolute left-3 top-3.5 text-gray-400 text-sm">S</span>
      </div>
      <div id="srch-placeholder" class="text-center py-16 text-gray-400 text-sm">输入序列号进行搜索</div>
      <div id="srch-empty" class="hidden text-center py-16 text-gray-400 text-sm">未找到相关记录</div>
      <div id="srch-results"></div>
    </div>
  </div>

  <!-- TAB: 数据 -->
  <div id="tab-data" class="tab-content">
    <div class="p-4 space-y-4">
      <div class="bg-white rounded-xl shadow-sm p-4">
        <p class="text-sm font-medium text-gray-700 mb-3">数据统计</p>
        <div class="grid grid-cols-3 gap-2 text-center">
          <div><div id="st-rows" class="text-2xl font-bold text-blue-600">0</div><div class="text-xs text-gray-400 mt-1">排</div></div>
          <div><div id="st-layers" class="text-2xl font-bold text-green-600">0</div><div class="text-xs text-gray-400 mt-1">层</div></div>
          <div><div id="st-items" class="text-2xl font-bold text-purple-600">0</div><div class="text-xs text-gray-400 mt-1">序列号</div></div>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 space-y-3">
        <p class="text-sm font-medium text-gray-700">批量导入序列号</p>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择排</label>
          <select id="bt-row" onchange="refreshBtLayer()" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">选择层</label>
          <select id="bt-layer" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">
            <option value="">-- 请先选择排 --</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">序列号（每行一个）</label>
          <textarea id="bt-serials" rows="5" placeholder="123456&#10;123457&#10;123458"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-mono resize-none focus:outline-none focus:border-blue-400"></textarea>
        </div>
        <button onclick="doBatchImport()" class="w-full bg-green-600 text-white py-3 rounded-xl text-sm font-medium">批量导入</button>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 space-y-2">
        <p class="text-sm font-medium text-gray-700 mb-1">数据备份</p>
        <button onclick="doExport()" class="w-full bg-blue-50 text-blue-700 border border-blue-200 py-3 rounded-xl text-sm font-medium">导出 JSON 备份</button>
        <button onclick="document.getElementById('imp-file').click()" class="w-full bg-gray-50 text-gray-700 border border-gray-200 py-3 rounded-xl text-sm font-medium">导入 JSON 备份</button>
        <input id="imp-file" type="file" accept=".json" onchange="doImport(event)" class="hidden">
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 border border-red-100">
        <p class="text-sm font-medium text-red-500 mb-2">危险操作</p>
        <button onclick="confirmReset()" class="w-full bg-red-50 text-red-600 border border-red-200 py-3 rounded-xl text-sm font-medium">重置全部数据</button>
      </div>
    </div>
  </div>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
  <div class="max-w-lg mx-auto grid grid-cols-4">
    <button onclick="gotoTab('inventory')" id="nav-inventory" class="flex flex-col items-center py-2 text-blue-600 border-t-2 border-blue-600">
      <span class="text-lg font-bold">#</span><span class="text-xs mt-0.5 font-medium">库存</span>
    </button>
    <button onclick="gotoTab('scanner')" id="nav-scanner" class="flex flex-col items-center py-2 text-gray-400 border-t-2 border-transparent">
      <span class="text-lg">O</span><span class="text-xs mt-0.5">扫码</span>
    </button>
    <button onclick="gotoTab('search')" id="nav-search" class="flex flex-col items-center py-2 text-gray-400 border-t-2 border-transparent">
      <span class="text-lg">S</span><span class="text-xs mt-0.5">搜索</span>
    </button>
    <button onclick="gotoTab('data')" id="nav-data" class="flex flex-col items-center py-2 text-gray-400 border-t-2 border-transparent">
      <span class="text-lg">D</span><span class="text-xs mt-0.5">数据</span>
    </button>
  </div>
</nav>

</div>

<!-- Modal -->
<div id="modal-mask" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center flex">
  <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg p-5 pb-8 sm:pb-5 max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modal-title" class="text-base font-semibold text-gray-800"></h3>
      <button onclick="closeModal()" class="text-gray-400 text-lg leading-none px-1">x</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-14 inset-x-0 flex justify-center z-50 pointer-events-none hidden">
  <div id="toast-inner" class="bg-gray-800 text-white text-sm px-4 py-2 rounded-full shadow-lg max-w-xs text-center"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────
const KEY = 'chassis_v1';
let db = {rows:[]};

function load(){try{const s=localStorage.getItem(KEY);if(s)db=JSON.parse(s);}catch(e){db={rows:[]};}}
function save(){localStorage.setItem(KEY,JSON.stringify(db));refreshStats();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function now(){return new Date().toISOString();}
function fmtDate(s){if(!s)return'-';const d=new Date(s);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;}
function p2(n){return String(n).padStart(2,'0');}
function chNum(n){return['一','二','三','四','五','六','七','八','九','十'][n]||String(n+1);}

function addRow(name){const r={id:uid(),name,layers:[]};db.rows.push(r);save();return r;}
function delRow(id){db.rows=db.rows.filter(r=>r.id!==id);save();}
function updRow(id,name){const r=db.rows.find(r=>r.id===id);if(r){r.name=name;save();}}

function addLayer(rowId,name){const r=db.rows.find(r=>r.id===rowId);if(!r)return;const l={id:uid(),name,items:[]};r.layers.push(l);save();return l;}
function delLayer(rowId,lid){const r=db.rows.find(r=>r.id===rowId);if(r){r.layers=r.layers.filter(l=>l.id!==lid);save();}}
function updLayer(rowId,lid,name){const r=db.rows.find(r=>r.id===rowId);if(!r)return;const l=r.layers.find(l=>l.id===lid);if(l){l.name=name;save();}}

function addItem(rowId,layerId,sn,notes=''){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return null;
  const l=r.layers.find(l=>l.id===layerId);if(!l)return null;
  if(allItems().find(e=>e.item.serialNumber===sn))return'dup';
  const item={id:uid(),serialNumber:sn,name:'机箱',notes,createdAt:now(),updatedAt:now()};
  l.items.push(item);save();return item;
}
function delItem(rowId,lid,iid){const r=db.rows.find(r=>r.id===rowId);if(!r)return;const l=r.layers.find(l=>l.id===lid);if(l){l.items=l.items.filter(i=>i.id!==iid);save();}}
function updItem(rowId,lid,iid,data){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  const l=r.layers.find(l=>l.id===lid);if(!l)return;
  const i=l.items.find(i=>i.id===iid);if(i){Object.assign(i,data,{updatedAt:now()});save();}
}
function moveItem(sn,srcRowId,srcLid,dstRowId,dstLid,notes){
  const sr=db.rows.find(r=>r.id===srcRowId);if(!sr)return;
  const sl=sr.layers.find(l=>l.id===srcLid);if(!sl)return;
  const idx=sl.items.findIndex(i=>i.serialNumber===sn);if(idx===-1)return;
  const item=sl.items.splice(idx,1)[0];
  item.notes=notes;item.updatedAt=now();
  const dr=db.rows.find(r=>r.id===dstRowId);if(!dr)return;
  const dl=dr.layers.find(l=>l.id===dstLid);if(!dl)return;
  dl.items.push(item);save();
}

function allItems(){
  const out=[];
  db.rows.forEach(row=>row.layers.forEach(layer=>layer.items.forEach(item=>out.push({row,layer,item}))));
  return out;
}
function stats(){let la=0,it=0;db.rows.forEach(r=>{la+=r.layers.length;r.layers.forEach(l=>it+=l.items.length);});return{rows:db.rows.length,layers:la,items:it};}

// ── UI HELPERS ─────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let _toastTimer=null;
function toast(msg,type='ok'){
  clearTimeout(_toastTimer);
  const el=document.getElementById('toast');const inner=document.getElementById('toast-inner');
  inner.textContent=msg;
  inner.className=`text-white text-sm px-4 py-2 rounded-full shadow-lg max-w-xs text-center ${type==='err'?'bg-red-600':'bg-gray-800'}`;
  el.classList.remove('hidden');
  _toastTimer=setTimeout(()=>el.classList.add('hidden'),2500);
}

function showModal(title,html){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal-mask').classList.remove('hidden');
  document.getElementById('modal-mask').classList.add('flex');
}
function closeModal(){
  document.getElementById('modal-mask').classList.add('hidden');
  document.getElementById('modal-mask').classList.remove('flex');
}
document.getElementById('modal-mask').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── TABS ──────────────────────────────────────────────────
let activeTab='inventory';
let scanner=null;

function gotoTab(tab){
  if(activeTab==='scanner'&&tab!=='scanner')stopScan();
  activeTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>{el.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>{
    b.classList.remove('text-blue-600','border-blue-600');
    b.classList.add('text-gray-400','border-transparent');
  });
  const nb=document.getElementById('nav-'+tab);
  nb.classList.remove('text-gray-400','border-transparent');
  nb.classList.add('text-blue-600','border-blue-600');

  if(tab==='inventory')renderInv();
  if(tab==='data'){refreshStats();refreshBtSelects();}
  if(tab==='scanner')refreshScSelects();
  if(tab==='search'){document.getElementById('srch-input').value='';document.getElementById('srch-results').innerHTML='';document.getElementById('srch-placeholder').classList.remove('hidden');document.getElementById('srch-empty').classList.add('hidden');}
}

// ── INVENTORY ─────────────────────────────────────────────
function renderInv(){
  const c=document.getElementById('rows-container');
  const e=document.getElementById('inv-empty');
  if(!db.rows.length){c.innerHTML='';e.classList.remove('hidden');return;}
  e.classList.add('hidden');
  c.innerHTML=db.rows.map(renderRow).join('');
}

function renderRow(row){
  const cnt=row.layers.reduce((s,l)=>s+l.items.length,0);
  return`<div class="bg-white rounded-xl shadow-sm mb-3 overflow-hidden fade-in" id="R${row.id}">
  <div class="flex items-center justify-between px-4 py-3 cursor-pointer border-b border-gray-50" onclick="toggleEl('RC${row.id}','RA${row.id}')">
    <div class="flex items-center gap-2">
      <span id="RA${row.id}" class="text-xs text-gray-400">+</span>
      <span class="font-medium text-gray-800">${esc(row.name)}</span>
      <span class="text-xs text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">${row.layers.length}层/${cnt}台</span>
    </div>
    <div class="flex gap-1">
      <button onclick="event.stopPropagation();editRowModal('${row.id}')" class="px-2 py-1 text-xs text-gray-400 hover:text-blue-600 rounded">编辑</button>
      <button onclick="event.stopPropagation();delRowConfirm('${row.id}')" class="px-2 py-1 text-xs text-gray-400 hover:text-red-500 rounded">删除</button>
    </div>
  </div>
  <div id="RC${row.id}" class="hidden">
    ${row.layers.map(l=>renderLayer(row.id,l)).join('')}
    <div class="p-3 border-t border-gray-50">
      <button onclick="addLayerModal('${row.id}')" class="w-full py-2 border-2 border-dashed border-gray-200 rounded-lg text-xs text-gray-400 hover:border-blue-300 hover:text-blue-500">+ 添加层</button>
    </div>
  </div>
</div>`;}

function renderLayer(rowId,layer){
  return`<div class="border-b border-gray-50" id="L${layer.id}">
  <div class="flex items-center justify-between px-4 py-2 bg-gray-50 cursor-pointer" onclick="toggleEl('LC${layer.id}','LA${layer.id}')">
    <div class="flex items-center gap-2">
      <span id="LA${layer.id}" class="text-xs text-gray-400">+</span>
      <span class="text-sm text-gray-700 font-medium">${esc(layer.name)}</span>
      <span class="text-xs text-gray-400">${layer.items.length}台</span>
    </div>
    <div class="flex gap-1">
      <button onclick="event.stopPropagation();addItemModal('${rowId}','${layer.id}')" class="px-2 py-1 text-xs text-blue-600 hover:bg-blue-50 rounded">+ 序列号</button>
      <button onclick="event.stopPropagation();editLayerModal('${rowId}','${layer.id}')" class="px-2 py-1 text-xs text-gray-400 hover:text-blue-600 rounded">编辑</button>
      <button onclick="event.stopPropagation();delLayerConfirm('${rowId}','${layer.id}')" class="px-2 py-1 text-xs text-gray-400 hover:text-red-500 rounded">删除</button>
    </div>
  </div>
  <div id="LC${layer.id}" class="hidden px-3 py-2 space-y-2">
    ${layer.items.length?layer.items.map(i=>renderItem(rowId,layer.id,i)).join(''):'<p class="text-xs text-gray-300 py-2 text-center">暂无序列号</p>'}
  </div>
</div>`;}

function renderItem(rowId,lid,item){
  return`<div class="border border-gray-100 rounded-lg p-3 flex items-start justify-between bg-white fade-in" id="I${item.id}">
  <div class="flex-1 min-w-0">
    <div class="font-mono text-sm text-gray-800">${esc(item.serialNumber)}</div>
    <div class="text-xs text-gray-400 mt-0.5">${esc(item.name)}${item.notes?' · '+esc(item.notes):''}</div>
    <div class="text-xs text-gray-300 mt-0.5">编辑: ${fmtDate(item.updatedAt)}</div>
  </div>
  <div class="flex gap-1 ml-2 shrink-0">
    <button onclick="editItemModal('${rowId}','${lid}','${item.id}')" class="px-2 py-1 text-xs text-gray-400 hover:text-blue-600 rounded">编辑</button>
    <button onclick="delItemConfirm('${rowId}','${lid}','${item.id}')" class="px-2 py-1 text-xs text-gray-400 hover:text-red-500 rounded">删除</button>
  </div>
</div>`;}

function toggleEl(contentId,arrowId){
  const c=document.getElementById(contentId);const a=document.getElementById(arrowId);
  const hidden=c.classList.contains('hidden');
  c.classList.toggle('hidden',!hidden);
  if(a)a.textContent=hidden?'-':'+';
}

// ── ROW MODALS ────────────────────────────────────────────
function showAddRowModal(){
  showModal('新增排',`<div class="space-y-3">
    <input id="m-rn" type="text" value="第${chNum(db.rows.length)}排" placeholder="排名称"
      class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
    <button onclick="submitAddRow()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">确认添加</button>
  </div>`);
  setTimeout(()=>{const e=document.getElementById('m-rn');if(e){e.focus();e.select();}},80);
}
function submitAddRow(){
  const n=document.getElementById('m-rn').value.trim();
  if(!n){toast('请输入排名称','err');return;}
  addRow(n);closeModal();renderInv();toast('添加成功');
}
function editRowModal(id){
  const r=db.rows.find(r=>r.id===id);if(!r)return;
  showModal('编辑排名称',`<div class="space-y-3">
    <input id="m-rn" type="text" value="${esc(r.name)}"
      class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
    <button onclick="submitEditRow('${id}')" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">保存</button>
  </div>`);
  setTimeout(()=>{const e=document.getElementById('m-rn');if(e){e.focus();e.select();}},80);
}
function submitEditRow(id){
  const n=document.getElementById('m-rn').value.trim();
  if(!n){toast('名称不能为空','err');return;}
  updRow(id,n);closeModal();renderInv();toast('已更新');
}
function delRowConfirm(id){
  const r=db.rows.find(r=>r.id===id);if(!r)return;
  const total=r.layers.reduce((s,l)=>s+l.items.length,0);
  showModal('确认删除',`<div class="space-y-4">
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">
      <p class="font-medium">删除「${esc(r.name)}」？</p>
      <p class="text-red-400 mt-1">含 ${r.layers.length} 层、${total} 台，不可恢复</p>
    </div>
    <div class="flex gap-3">
      <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm text-gray-600">取消</button>
      <button onclick="execDelRow('${id}')" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-sm font-medium">确认删除</button>
    </div>
  </div>`);
}
function execDelRow(id){delRow(id);closeModal();renderInv();toast('已删除','err');}

// ── LAYER MODALS ──────────────────────────────────────────
function addLayerModal(rowId){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  showModal('添加层',`<div class="space-y-3">
    <p class="text-xs text-gray-400">${esc(r.name)}</p>
    <input id="m-ln" type="text" value="第${chNum(r.layers.length)}层" placeholder="层名称"
      class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
    <button onclick="submitAddLayer('${rowId}')" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">确认添加</button>
  </div>`);
  setTimeout(()=>{const e=document.getElementById('m-ln');if(e){e.focus();e.select();}},80);
}
function submitAddLayer(rowId){
  const n=document.getElementById('m-ln').value.trim();
  if(!n){toast('请输入层名称','err');return;}
  addLayer(rowId,n);closeModal();renderInv();toast('添加成功');
}
function editLayerModal(rowId,lid){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  const l=r.layers.find(l=>l.id===lid);if(!l)return;
  showModal('编辑层名称',`<div class="space-y-3">
    <input id="m-ln" type="text" value="${esc(l.name)}"
      class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
    <button onclick="submitEditLayer('${rowId}','${lid}')" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">保存</button>
  </div>`);
  setTimeout(()=>{const e=document.getElementById('m-ln');if(e){e.focus();e.select();}},80);
}
function submitEditLayer(rowId,lid){
  const n=document.getElementById('m-ln').value.trim();
  if(!n){toast('名称不能为空','err');return;}
  updLayer(rowId,lid,n);closeModal();renderInv();toast('已更新');
}
function delLayerConfirm(rowId,lid){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  const l=r.layers.find(l=>l.id===lid);if(!l)return;
  showModal('确认删除',`<div class="space-y-4">
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">
      <p class="font-medium">删除「${esc(l.name)}」？</p>
      <p class="text-red-400 mt-1">含 ${l.items.length} 台序列号，不可恢复</p>
    </div>
    <div class="flex gap-3">
      <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm text-gray-600">取消</button>
      <button onclick="execDelLayer('${rowId}','${lid}')" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-sm font-medium">确认删除</button>
    </div>
  </div>`);
}
function execDelLayer(rowId,lid){delLayer(rowId,lid);closeModal();renderInv();toast('已删除','err');}

// ── ITEM MODALS ───────────────────────────────────────────
function addItemModal(rowId,lid){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  const l=r.layers.find(l=>l.id===lid);if(!l)return;
  showModal('添加序列号',`<div class="space-y-3">
    <p class="text-xs text-gray-400">${esc(r.name)} &gt; ${esc(l.name)}</p>
    <div>
      <label class="text-xs text-gray-400 block mb-1">序列号</label>
      <input id="m-sn" type="text" placeholder="输入序列号"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-blue-400">
    </div>
    <div>
      <label class="text-xs text-gray-400 block mb-1">备注（可选）</label>
      <input id="m-nt" type="text" placeholder="可留空"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
    </div>
    <button onclick="submitAddItem('${rowId}','${lid}')" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">保存</button>
  </div>`);
  setTimeout(()=>{const e=document.getElementById('m-sn');if(e)e.focus();},80);
}
function submitAddItem(rowId,lid){
  const sn=document.getElementById('m-sn').value.trim();
  const nt=document.getElementById('m-nt').value.trim();
  if(!sn){toast('请输入序列号','err');return;}
  const r=addItem(rowId,lid,sn,nt);
  if(r==='dup'){toast('该序列号已存在！','err');return;}
  closeModal();renderInv();toast('添加成功');
}

function editItemModal(rowId,lid,iid){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  const l=r.layers.find(l=>l.id===lid);if(!l)return;
  const item=l.items.find(i=>i.id===iid);if(!item)return;
  const rowOpts=db.rows.map(row=>`<option value="${row.id}"${row.id===rowId?' selected':''}>${esc(row.name)}</option>`).join('');
  const layOpts=r.layers.map(ly=>`<option value="${ly.id}"${ly.id===lid?' selected':''}>${esc(ly.name)}</option>`).join('');
  showModal('编辑序列号',`<div class="space-y-3">
    <div>
      <label class="text-xs text-gray-400 block mb-1">序列号</label>
      <input id="m-esn" type="text" value="${esc(item.serialNumber)}"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-blue-400">
    </div>
    <div>
      <label class="text-xs text-gray-400 block mb-1">移至（排）</label>
      <select id="m-er" onchange="refreshEditLayer('${rowId}','${lid}')" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">${rowOpts}</select>
    </div>
    <div>
      <label class="text-xs text-gray-400 block mb-1">移至（层）</label>
      <select id="m-el" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-blue-400">${layOpts}</select>
    </div>
    <div>
      <label class="text-xs text-gray-400 block mb-1">备注</label>
      <input id="m-ent" type="text" value="${esc(item.notes||'')}" placeholder="可留空"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400">
    </div>
    <button onclick="submitEditItem('${rowId}','${lid}','${iid}')" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-medium">保存修改</button>
  </div>`);
}
function refreshEditLayer(origRow,origLid){
  const newRowId=document.getElementById('m-er').value;
  const r=db.rows.find(r=>r.id===newRowId);
  const sel=document.getElementById('m-el');
  if(!r){sel.innerHTML='<option>无层</option>';return;}
  sel.innerHTML=r.layers.map(l=>`<option value="${l.id}"${l.id===origLid&&newRowId===origRow?' selected':''}>${esc(l.name)}</option>`).join('')||'<option value="">请先添加层</option>';
}
function submitEditItem(origRowId,origLid,iid){
  const sn=document.getElementById('m-esn').value.trim();
  const newRowId=document.getElementById('m-er').value;
  const newLid=document.getElementById('m-el').value;
  const nt=document.getElementById('m-ent').value.trim();
  if(!sn){toast('序列号不能为空','err');return;}
  if(!newLid){toast('请选择层','err');return;}
  const dup=allItems().find(e=>e.item.serialNumber===sn&&e.item.id!==iid);
  if(dup){toast('该序列号已存在！','err');return;}
  if(newRowId===origRowId&&newLid===origLid){
    updItem(origRowId,origLid,iid,{serialNumber:sn,notes:nt});
  } else {
    updItem(origRowId,origLid,iid,{serialNumber:sn,notes:nt});
    const sr=db.rows.find(r=>r.id===origRowId);
    const sl=sr&&sr.layers.find(l=>l.id===origLid);
    if(sl){
      const idx=sl.items.findIndex(i=>i.id===iid);
      if(idx!==-1){
        const item=sl.items.splice(idx,1)[0];
        const dr=db.rows.find(r=>r.id===newRowId);
        const dl=dr&&dr.layers.find(l=>l.id===newLid);
        if(dl)dl.items.push(item);
        save();
      }
    }
  }
  closeModal();renderInv();toast('已更新');
}
function delItemConfirm(rowId,lid,iid){
  const r=db.rows.find(r=>r.id===rowId);if(!r)return;
  const l=r.layers.find(l=>l.id===lid);if(!l)return;
  const item=l.items.find(i=>i.id===iid);if(!item)return;
  showModal('确认删除',`<div class="space-y-4">
    <div class="bg-red-50 border border-red-200 rounded-xl p-4">
      <p class="text-sm font-medium text-red-700">删除序列号？</p>
      <p class="font-mono text-red-800 mt-1">${esc(item.serialNumber)}</p>
    </div>
    <div class="flex gap-3">
      <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm text-gray-600">取消</button>
      <button onclick="execDelItem('${rowId}','${lid}','${iid}')" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-sm font-medium">确认删除</button>
    </div>
  </div>`);
}
function execDelItem(rowId,lid,iid){delItem(rowId,lid,iid);closeModal();renderInv();toast('已删除','err');}

// ── SCANNER ───────────────────────────────────────────────
let qr=null;

function refreshScSelects(){
  const rs=document.getElementById('sc-row');
  rs.innerHTML='<option value="">-- 请选择排 --</option>'+db.rows.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('');
  document.getElementById('sc-layer').innerHTML='<option value="">-- 请先选择排 --</option>';
}
function refreshScLayer(){
  const id=document.getElementById('sc-row').value;
  const r=db.rows.find(r=>r.id===id);
  const sel=document.getElementById('sc-layer');
  if(!r){sel.innerHTML='<option value="">-- 请先选择排 --</option>';return;}
  sel.innerHTML=r.layers.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')||'<option value="">该排无层</option>';
}
function startScan(){
  if(!qr)qr=new Html5Qrcode('reader');
  if(qr.isScanning)return;
  qr.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:240}},
    (text)=>{
      document.getElementById('sc-serial').value=text;
      document.getElementById('scan-result-val').textContent=text;
      document.getElementById('scan-result-bar').classList.remove('hidden');
      stopScan();toast('扫码成功');
    },()=>{}
  ).catch(()=>toast('无法启动摄像头，请检查权限','err'));
}
function stopScan(){if(qr&&qr.isScanning)qr.stop().catch(()=>{});}
function submitScanEntry(){
  const sn=document.getElementById('sc-serial').value.trim();
  const rowId=document.getElementById('sc-row').value;
  const lid=document.getElementById('sc-layer').value;
  const nt=document.getElementById('sc-notes').value.trim();
  if(!sn){toast('请输入或扫描序列号','err');return;}
  if(!rowId){toast('请选择排','err');return;}
  if(!lid){toast('请选择层','err');return;}
  const r=addItem(rowId,lid,sn,nt);
  if(r==='dup'){toast('该序列号已存在！','err');return;}
  document.getElementById('sc-serial').value='';
  document.getElementById('sc-notes').value='';
  document.getElementById('scan-result-bar').classList.add('hidden');
  toast('录入成功');
}

// ── SEARCH ────────────────────────────────────────────────
function doSearch(){
  const q=document.getElementById('srch-input').value.trim();
  const res=document.getElementById('srch-results');
  const emp=document.getElementById('srch-empty');
  const ph=document.getElementById('srch-placeholder');
  if(!q){res.innerHTML='';emp.classList.add('hidden');ph.classList.remove('hidden');return;}
  ph.classList.add('hidden');
  const lq=q.toLowerCase();
  const found=allItems().filter(e=>e.item.serialNumber.toLowerCase().includes(lq));
  if(!found.length){res.innerHTML='';emp.classList.remove('hidden');return;}
  emp.classList.add('hidden');
  res.innerHTML=found.map(e=>`
    <div class="bg-white rounded-xl shadow-sm p-4 mb-3 fade-in">
      <div class="flex items-start justify-between">
        <div class="flex-1">
          <div class="font-mono font-medium text-gray-800">${hlMatch(e.item.serialNumber,q)}</div>
          <div class="text-sm text-gray-500 mt-1">${esc(e.item.name)}</div>
          <div class="text-sm text-blue-600 mt-0.5">${esc(e.row.name)} &gt; ${esc(e.layer.name)}</div>
          ${e.item.notes?`<div class="text-xs text-gray-400 mt-0.5">备注: ${esc(e.item.notes)}</div>`:''}
          <div class="text-xs text-gray-300 mt-1">最后编辑: ${fmtDate(e.item.updatedAt)}</div>
        </div>
        <button onclick="editItemModal('${e.row.id}','${e.layer.id}','${e.item.id}')" class="ml-2 px-2 py-1 text-xs text-gray-400 hover:text-blue-600 rounded">编辑</button>
      </div>
    </div>`).join('');
}
function hlMatch(text,q){
  const s=esc(text);const qe=esc(q);
  return s.replace(new RegExp(qe,'gi'),m=>`<mark>${m}</mark>`);
}

// ── DATA TAB ──────────────────────────────────────────────
function refreshStats(){
  const s=stats();
  const g=id=>document.getElementById(id);
  if(g('st-rows'))g('st-rows').textContent=s.rows;
  if(g('st-layers'))g('st-layers').textContent=s.layers;
  if(g('st-items'))g('st-items').textContent=s.items;
  if(g('hd-count'))g('hd-count').textContent=s.items+' 台';
}
function refreshBtSelects(){
  const rs=document.getElementById('bt-row');if(!rs)return;
  rs.innerHTML='<option value="">-- 请选择排 --</option>'+db.rows.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('');
  document.getElementById('bt-layer').innerHTML='<option value="">-- 请先选择排 --</option>';
}
function refreshBtLayer(){
  const id=document.getElementById('bt-row').value;
  const r=db.rows.find(r=>r.id===id);
  const sel=document.getElementById('bt-layer');
  if(!r){sel.innerHTML='<option value="">-- 请先选择排 --</option>';return;}
  sel.innerHTML=r.layers.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')||'<option value="">该排无层</option>';
}
function doBatchImport(){
  const rowId=document.getElementById('bt-row').value;
  const lid=document.getElementById('bt-layer').value;
  const txt=document.getElementById('bt-serials').value.trim();
  if(!rowId){toast('请选择排','err');return;}
  if(!lid){toast('请选择层','err');return;}
  if(!txt){toast('请输入序列号','err');return;}
  const sns=txt.split('\n').map(s=>s.trim()).filter(Boolean);
  let added=0,dup=0;
  sns.forEach(sn=>{const r=addItem(rowId,lid,sn);if(r==='dup')dup++;else if(r)added++;});
  document.getElementById('bt-serials').value='';
  toast(`导入完成：添加 ${added} 个，跳过重复 ${dup} 个`);
}
function doExport(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`机箱库存_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  a.click();URL.revokeObjectURL(url);toast('导出成功');
}
function doImport(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.rows||!Array.isArray(data.rows))throw new Error();
      window.__imp=data;
      showModal('确认导入',`<div class="space-y-4">
        <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-sm text-yellow-800">
          <p class="font-medium">将覆盖现有全部数据！</p>
          <p class="mt-1">文件含 ${data.rows.length} 排，确认导入？</p>
        </div>
        <div class="flex gap-3">
          <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm text-gray-600">取消</button>
          <button onclick="execImport()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-sm font-medium">确认导入</button>
        </div>
      </div>`);
    }catch{toast('文件格式错误','err');}
  };
  reader.readAsText(f);
  e.target.value='';
}
function execImport(){if(!window.__imp)return;db=window.__imp;save();closeModal();renderInv();toast('导入成功');}
function confirmReset(){
  showModal('重置全部数据',`<div class="space-y-4">
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">
      <p class="font-bold">此操作不可恢复！</p>
      <p class="mt-1">删除全部排、层、序列号数据。建议先导出备份。</p>
    </div>
    <input id="m-confirm" type="text" placeholder="输入「确认重置」继续"
      class="w-full border border-red-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:border-red-400">
    <div class="flex gap-3">
      <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-sm text-gray-600">取消</button>
      <button onclick="execReset()" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-sm font-medium">重置</button>
    </div>
  </div>`);
}
function execReset(){
  if(document.getElementById('m-confirm').value.trim()!=='确认重置'){toast('请输入「确认重置」','err');return;}
  db={rows:[]};save();closeModal();renderInv();toast('已重置','err');
}

// ── INIT ──────────────────────────────────────────────────
load();
renderInv();
refreshStats();
</script>
</body>
